# =====================================================================
#  Конфигурация новостного бота
# =====================================================================
#
#  Тему можно задать ДВУМЯ способами (можно совмещать в одной теме):
#
#  1) google_news: "запрос обычным текстом"
#     Бот сам построит ссылку на поиск Google News. Сам запрос И ЕСТЬ
#     фильтр, поэтому keywords тут НЕ нужны.
#     Можно использовать операторы: OR, кавычки "точная фраза", -минус.
#       пример:  google_news: '"искусственный интеллект" OR нейросеть -реклама'
#
#  2) feeds: [список готовых RSS-ссылок]
#     Для конкретных СМИ/блогов. Если лента ОБЩАЯ (обо всём подряд) —
#     добавьте keywords, чтобы отобрать только нужное. Если лента уже
#     узкотематическая — keywords оставьте пустыми.
#
#  ПРАВИЛО: фильтр уже в источнике (google_news / узкий RSS) → keywords пусто.
#           источник общий → keywords обязательны.
# =====================================================================

# За сколько часов до запуска собирать новости.
# Запуск в 10:00 + 24 = окно "вчера 10:00 — сегодня 10:00".
lookback_hours: 24

max_items_per_topic: 5

google_news_locale:
  hl: en
  gl: US
  ceid: US:en

topics:

  - name: "🤖 AI"
    google_news: 'OpenAI OR Anthropic OR Claude OR Gemini OR ChatGPT OR "Artificial Intelligence" OR AI OR LLM OR "Machine Learning"'

  - name: "🌍 World"
    google_news: '"World News" OR Geopolitics OR International OR Economy OR Technology'

  - name: "🚀 Startups & Tech"
    google_news: 'Startup OR Startups OR Venture Capital OR Funding OR Acquisition OR Technology OR Innovation'


  
