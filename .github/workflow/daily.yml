name: Daily News Digest

on:
  schedule:
    # ВНИМАНИЕ: cron в GitHub Actions работает по UTC.
    # 07:00 UTC = 10:00 по Москве (UTC+3). Поменяйте час под свой пояс.
    - cron: "0 7 * * *"
  workflow_dispatch: {}   # позволяет запустить вручную кнопкой "Run workflow"

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - run: python news_bot.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

